[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "octowiz"
version = "0.0.6"
description = "Octowiz Bridge — Claude Code adapter for the Octowiz Engineering Agent"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"
dependencies = ["httpx>=0.27.0"]

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools]
py-modules = ["octowiz_cache", "octowiz_cache_cli", "import_litellm_memories", "octowiz_env"]

[project.scripts]
octowiz-cache = "octowiz_cache_cli:main"
