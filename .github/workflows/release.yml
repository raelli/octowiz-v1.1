name: release

on:
  workflow_dispatch:

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          OLD="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

          jq --arg v "$NEW" '.version = $v' .claude-plugin/plugin.json > /tmp/plugin.json && mv /tmp/plugin.json .claude-plugin/plugin.json
          jq --arg v "$NEW" '.version = $v' package.json > /tmp/package.json && mv /tmp/package.json package.json

      - name: Commit and tag
        # NOTE: if main has branch protection requiring pull requests, the
        # default GITHUB_TOKEN cannot push directly. Create a PAT with repo
        # write access, store it as RELEASE_TOKEN, and replace the token:
        # value in the checkout step with ${{ secrets.RELEASE_TOKEN }}.
        run: |
          NEW="${{ steps.bump.outputs.new_version }}"
          git add .claude-plugin/plugin.json package.json
          git commit -m "chore: bump version to $NEW"
          git tag "v$NEW"
          git push origin main --tags
