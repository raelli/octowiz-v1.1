name: release

on:
  workflow_dispatch:

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          OLD="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

          # Update .claude-plugin/plugin.json
          python3 -c "
import json
with open('.claude-plugin/plugin.json') as f:
    d = json.load(f)
d['version'] = '$NEW'
with open('.claude-plugin/plugin.json', 'w') as f:
    json.dump(d, f, indent=2)
    f.write('\n')
          "

          # Update package.json
          python3 -c "
import json
with open('package.json') as f:
    d = json.load(f)
d['version'] = '$NEW'
with open('package.json', 'w') as f:
    json.dump(d, f, indent=2)
    f.write('\n')
          "

      - name: Commit and tag
        # NOTE: if main has branch protection requiring pull requests, the
        # default GITHUB_TOKEN cannot push directly. Create a PAT with repo
        # write access, store it as RELEASE_TOKEN, and replace the token:
        # value in the checkout step with ${{ secrets.RELEASE_TOKEN }}.
        run: |
          NEW="${{ steps.bump.outputs.new_version }}"
          git add .claude-plugin/plugin.json package.json
          git commit -m "chore: bump version to $NEW"
          git tag "v$NEW"
          git push origin main --tags

      - name: Sync version to IntegraHub marketplace
        env:
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          curl -sf -X POST "https://llm.integrahub.de/claude-code/plugins" \
            -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"octowiz\",
              \"source\": {\"source\": \"github\", \"repo\": \"raelli/octowiz\"},
              \"version\": \"$VERSION\",
              \"description\": \"A skill-backed memory stack for coding agents.\",
              \"keywords\": [\"claude-code\", \"mattpocock\", \"superpowers\", \"antfu-skill\"],
              \"category\": \"Development\"
            }" | tee /tmp/result.json
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/result.json')).get('status',''))")
          if [ "$STATUS" != "success" ]; then
            echo "Marketplace upsert failed" >&2
            exit 1
          fi
          echo "Marketplace updated: octowiz $VERSION"
