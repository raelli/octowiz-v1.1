name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check ephemeral runtime syntax
        run: |
          node --check hooks/scripts/local.js
          node --check hooks/scripts/local-supervisor.js
          node --check hooks/scripts/start.js

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm lint

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and tests
        run: python -m pip install -e ".[dev]"

      - name: Run Python tests
        run: python -m pytest packages/memory_client/tests apps/claude_code_bridge/tests providers/tests
