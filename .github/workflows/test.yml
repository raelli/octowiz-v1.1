name: tests

on:
  push:
    branches: ["**"]

jobs:
  lint-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Clone quietly and lint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone -q --branch "$GITHUB_REF_NAME" --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          corepack enable
          pnpm install --frozen-lockfile --reporter=silent
          pnpm lint

  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: |
          node --check hooks/scripts/local.js
          node --check hooks/scripts/local-supervisor.js
          node --check hooks/scripts/start.js
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest packages/memory_client/tests apps/claude_code_bridge/tests providers/tests
