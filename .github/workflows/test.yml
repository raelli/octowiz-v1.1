name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run concise lint diagnostics
        shell: bash
        run: |
          corepack enable
          pnpm install --frozen-lockfile --reporter=silent
          pnpm lint

  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Check ephemeral runtime syntax
        run: |
          node --check hooks/scripts/local.js
          node --check hooks/scripts/local-supervisor.js
          node --check hooks/scripts/start.js
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest packages/memory_client/tests apps/claude_code_bridge/tests providers/tests
