name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run package and provider tests
        run: python -m pytest packages/ providers/ -v

      - name: Run A2A agent tests
        run: python -m pytest apps/a2a-agent/tests/ -v

      - name: Run bridge tests
        run: python -m pytest apps/claude_code_bridge/tests/ -v
