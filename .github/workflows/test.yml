name: tests

on:
  push:
    branches: ["**"]

permissions:
  contents: write

jobs:
  lint-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Apply deterministic ESLint fixes
        run: pnpm lint:fix
      - name: Commit formatting fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No lint fixes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply ESLint fixes"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: |
          node --check hooks/scripts/local.js
          node --check hooks/scripts/local-supervisor.js
          node --check hooks/scripts/start.js
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest packages/memory_client/tests apps/claude_code_bridge/tests providers/tests
